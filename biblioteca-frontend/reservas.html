<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema Biblioteca — Reservas de Sala</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ── SIDEBAR ─────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="icon-biblioteca">
        <img src="img/LOGO-SENA.jpg" alt="Logo SENA" class="sidebar-logo-img" />
      </div>
      <h4>Biblioteca SENA</h4>
      <p>Sistema de Gestión</p>
    </div>
    <nav>
      <a href="index.html">
        <span class="icono">
          <img src="img/logo-dashboard.png" alt="Dashboard" class="sidebar-icon-img" />
        </span>Dashboard
      </a>
      <a href="equipos.html">
        <span class="icono">
          <img src="img/logo-equipos.png" alt="Equipos" class="sidebar-icon-img" />
        </span>Equipos
      </a>
      <a href="prestamos.html">
        <span class="icono">
          <img src="img/logo-prestamos.png" alt="Préstamos" class="sidebar-icon-img" />
        </span>Préstamos
      </a>
      <a href="reservas.html" class="activo">
        <span class="icono">
          <img src="img/logo-calendario.png" alt="Reservas de Sala" class="sidebar-icon-img" />
        </span>Reservas de Sala
      </a>
      <a href="#" onclick="cerrarSesionAdmin()">
        <span class="icono">
          <img src="img/icon-cerrarsecion.png" alt="Cerrar Sesión" class="sidebar-icon-img" />
        </span>Cerrar Sesión
      </a>
    </nav>
  </aside>

  <!-- ── CONTENIDO PRINCIPAL ─────────────────────────────── -->
  <main class="contenido-principal admin-page">

    <header class="admin-page-hero">
      <div class="admin-page-hero-text">
        <h1>Reservas de sala</h1>
        <p>Gestiona las reservas de la sala de la biblioteca</p>
      </div>
      <div class="admin-page-hero-actions">
        <button type="button" class="btn btn-primary" onclick="abrirModalReserva()">+ Nueva reserva</button>
      </div>
    </header>

    <!-- Filtros -->
    <div class="card-custom admin-toolbar mb-4">
      <div class="card-body-custom">
        <div class="row g-3 align-items-end">

          <div class="col-md-4">
            <label class="form-label fw-semibold">Filtrar por fecha</label>
            <input
              type="date"
              class="form-control"
              id="filtro-fecha"
              onchange="cargarReservas()"
            />
          </div>

          <div class="col-md-4">
            <label class="form-label fw-semibold">Filtrar por estado</label>
            <select class="form-select" id="filtro-estado" onchange="cargarReservas()">
              <option value="">Todos los estados</option>
              <option value="activa">✅ Activa</option>
              <option value="cancelada">❌ Cancelada</option>
            </select>
          </div>

          <div class="col-md-4">
            <button class="btn btn-outline-secondary w-100" onclick="limpiarFiltros()">
              🔄 Limpiar filtros
            </button>
          </div>

        </div>
      </div>
    </div>

    <!-- Tabla de reservas -->
    <div class="card-custom admin-section-card">
      <div class="card-header-custom">
        <h5>Lista de reservas</h5>
        <span id="contador-reservas" class="admin-meta"></span>
      </div>
      <div id="contenedor-reservas">
        <div class="loading">
          <div class="spinner"></div>
          <p>Cargando reservas...</p>
        </div>
      </div>
    </div>

  </main>

  <!-- ── MODAL NUEVA RESERVA ──────────────────────────────── -->
  <div class="modal fade" id="modalReserva" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content modal-sena">

        <div class="modal-header">
          <h5 class="modal-title fw-bold">Nueva Reserva de Sala</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body p-4">
          <div class="row g-3">

            <div class="col-12">
              <label class="form-label fw-semibold">
                Nombre del solicitante <span class="text-danger">*</span>
              </label>
              <input
                type="text"
                class="form-control"
                id="reserva-nombre"
                placeholder="Nombre completo"
              />
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold">
                Fecha de la reserva <span class="text-danger">*</span>
              </label>
              <input
                type="date"
                class="form-control"
                id="reserva-fecha"
              />
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">
                Hora de inicio <span class="text-danger">*</span>
              </label>
              <input
                type="time"
                class="form-control"
                id="reserva-hora-inicio"
              />
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">
                Hora de fin <span class="text-danger">*</span>
              </label>
              <input
                type="time"
                class="form-control"
                id="reserva-hora-fin"
              />
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold">
                Motivo de la reserva <span class="text-danger">*</span>
              </label>
              <textarea
                class="form-control"
                id="reserva-motivo"
                rows="3"
                placeholder="Describe el motivo de la reserva"
              ></textarea>
            </div>

          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
            Cancelar
          </button>
          <button type="button" class="btn btn-primary" onclick="guardarReserva()">
            Crear Reserva
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- ── MODAL DETALLE DE RESERVA ─────────────────────────── -->
  <div class="modal fade" id="modalDetalle" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content modal-sena">

        <div class="modal-header">
          <h5 class="modal-title fw-bold">Detalle de la Reserva</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body p-4" id="contenido-detalle">
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
            Cerrar
          </button>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script>
    // ── VERIFICAR SESIÓN ADMIN ───────────────────────────────
    const token = sessionStorage.getItem('token');
    const usuarioData = sessionStorage.getItem('usuario');
    if (!token || !usuarioData) { window.location.href = 'login.html'; throw new Error('Sin sesión'); }
    const usuarioActual = JSON.parse(usuarioData);
    if (usuarioActual.rol !== 'admin') { window.location.href = 'usuario/index.html'; throw new Error('No es admin'); }

    const cerrarSesionAdmin = () => {
      if (confirm('¿Estás seguro que deseas cerrar sesión?')) {
        sessionStorage.removeItem('token');
        sessionStorage.removeItem('usuario');
        window.location.href = 'login.html';
      }
    };

    // ── CARGAR Y RENDERIZAR RESERVAS ─────────────────────────
    const cargarReservas = async () => {
      const contenedor = document.getElementById('contenedor-reservas');
      contenedor.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p>Cargando reservas...</p>
        </div>`;

      try {
        const fecha = document.getElementById('filtro-fecha').value;
        const estado = document.getElementById('filtro-estado').value;

        const filtros = {};
        if (fecha) filtros.fecha = fecha;
        if (estado) filtros.estado = estado;

        const respuesta = await reservasAPI.listar(filtros);
        const reservas = respuesta.data;

        // ✅ CORREGIDO: backticks añadidos
        document.getElementById('contador-reservas').textContent =
          `${respuesta.total} reserva(s) encontrada(s)`;

        if (reservas.length === 0) {
          contenedor.innerHTML = `
            <div class="estado-vacio">
              <div class="icono-vacio">📭</div>
              <p>No hay reservas que coincidan con los filtros</p>
            </div>`;
          return;
        }

        contenedor.innerHTML = `
          <table class="tabla-custom">
            <thead>
              <tr>
                <th>Solicitante</th>
                <th>Fecha</th>
                <th>Horario</th>
                <th>Motivo</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              ${reservas.map(r => `
                <tr style="${r.estado === 'cancelada' ? 'opacity:0.6;' : ''}">
                  <td><strong>${r.nombreSolicitante}</strong></td>
                  <td>${formatearFecha(r.fecha)}</td>
                  <td>
                    <span class="admin-time-pill">${r.horaInicio} — ${r.horaFin}</span>
                  </td>
                  <td class="text-secondary" style="max-width:200px;">
                    ${r.motivo}
                  </td>
                  <td>${badgeEstado(r.estado)}</td>
                  <td>
                    <div class="d-flex gap-2">
                      <button
                        class="btn btn-sm btn-outline-primary"
                        onclick="verDetalle('${r._id}')"
                        title="Ver detalle"
                      >👁️</button>
                      ${r.estado === 'activa' ? `
                        <button
                          class="btn btn-sm btn-outline-danger"
                          onclick="confirmarCancelar('${r._id}', '${r.nombreSolicitante}')"
                          title="Cancelar reserva"
                        >❌ Cancelar</button>
                      ` : ''}
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>`;

      } catch (error) {
        contenedor.innerHTML = `
          <div class="estado-vacio">
            <div class="icono-vacio">❌</div>
            <p>Error al cargar las reservas. ¿Está el servidor corriendo?</p>
          </div>`;
      }
    };

    // ── ABRIR MODAL NUEVA RESERVA ────────────────────────────
    const abrirModalReserva = () => {
      document.getElementById('reserva-nombre').value = '';
      document.getElementById('reserva-motivo').value = '';
      document.getElementById('reserva-hora-inicio').value = '';
      document.getElementById('reserva-hora-fin').value = '';

      const hoy = new Date().toISOString().split('T')[0];
      document.getElementById('reserva-fecha').value = hoy;

      new bootstrap.Modal(document.getElementById('modalReserva')).show();
    };

    // ── GUARDAR RESERVA ──────────────────────────────────────
    const guardarReserva = async () => {
      const nombreSolicitante = document.getElementById('reserva-nombre').value.trim();
      const fecha = document.getElementById('reserva-fecha').value;
      const horaInicio = document.getElementById('reserva-hora-inicio').value;
      const horaFin = document.getElementById('reserva-hora-fin').value;
      const motivo = document.getElementById('reserva-motivo').value.trim();

      if (!nombreSolicitante || !fecha || !horaInicio || !horaFin || !motivo) {
        mostrarNotificacion('Por favor completa todos los campos', 'advertencia');
        return;
      }

      if (horaInicio >= horaFin) {
        mostrarNotificacion('La hora de fin debe ser posterior a la hora de inicio', 'advertencia');
        return;
      }

      try {
        await reservasAPI.crear({ nombreSolicitante, fecha, horaInicio, horaFin, motivo });
        mostrarNotificacion('Reserva creada correctamente', 'exito');
        bootstrap.Modal.getInstance(document.getElementById('modalReserva')).hide();
        cargarReservas();

      } catch (error) {
        mostrarNotificacion(error.message, 'error');
      }
    };

    // ── VER DETALLE ──────────────────────────────────────────
    const verDetalle = async (id) => {
      try {
        const respuesta = await reservasAPI.obtener(id);
        const r = respuesta.data;

        document.getElementById('contenido-detalle').innerHTML = `
          <div style="display:grid; gap:16px;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
              <div>
                <p style="color:#6b7280; font-size:0.8rem; margin:0;">SOLICITANTE</p>
                <p style="font-weight:600; margin:0;">${r.nombreSolicitante}</p>
              </div>
              <div>
                <p style="color:#6b7280; font-size:0.8rem; margin:0;">ESTADO</p>
                <p style="margin:0;">${badgeEstado(r.estado)}</p>
              </div>
              <div>
                <p style="color:#6b7280; font-size:0.8rem; margin:0;">FECHA</p>
                <p style="font-weight:600; margin:0;">${formatearFecha(r.fecha)}</p>
              </div>
              <div>
                <p style="color:#6b7280; font-size:0.8rem; margin:0;">HORARIO</p>
                <p style="font-weight:600; margin:0;">🕐 ${r.horaInicio} — ${r.horaFin}</p>
              </div>
            </div>
            <div>
              <p style="color:#6b7280; font-size:0.8rem; margin:0;">MOTIVO</p>
              <p style="margin:0;">${r.motivo}</p>
            </div>
            <div>
              <p style="color:#6b7280; font-size:0.8rem; margin:0;">REGISTRADA EL</p>
              <p style="margin:0;">${formatearFechaHora(r.createdAt)}</p>
            </div>
          </div>`;

        new bootstrap.Modal(document.getElementById('modalDetalle')).show();
      } catch (error) {
        mostrarNotificacion('Error al cargar el detalle', 'error');
      }
    };

    // ── CONFIRMAR Y CANCELAR RESERVA ─────────────────────────
    const confirmarCancelar = (id, nombre) => {
      // ✅ CORREGIDO: backticks añadidos
      if (confirm(`¿Confirmas la cancelación de la reserva de "${nombre}"?`)) {
        cancelarReserva(id);
      }
    };

    const cancelarReserva = async (id) => {
      try {
        await reservasAPI.cancelar(id);
        mostrarNotificacion('Reserva cancelada correctamente', 'exito');
        cargarReservas();
      } catch (error) {
        mostrarNotificacion(error.message, 'error');
      }
    };

    // ── LIMPIAR FILTROS ──────────────────────────────────────
    const limpiarFiltros = () => {
      document.getElementById('filtro-fecha').value = '';
      document.getElementById('filtro-estado').value = '';
      cargarReservas();
    };

    cargarReservas();

  </script>

</body>
</html>
