<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema Biblioteca — Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    /* ── RESET ──────────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1b4220 0%, #257b34 50%, #39A900 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* ── TARJETA DE LOGIN ───────────────────────────────── */
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    /* ── LOGO / HEADER ──────────────────────────────────── */
    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 12px;
      display: inline-block;
    }

    .login-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 4px;
    }

    .login-header p {
      color: #6b7280;
      font-size: 0.875rem;
    }

    /* ── FORMULARIO ─────────────────────────────────────── */
    .form-label {
      font-weight: 600;
      color: #374151;
      font-size: 0.875rem;
    }

    .form-control {
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }

    .form-control:focus {
      border-color: #39A900;
      box-shadow: 0 0 0 3px rgba(57, 169, 0, 0.25);
    }

    /* ── BOTÓN ──────────────────────────────────────────── */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #145523, #39A900);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 8px;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(21, 102, 38, 0.55);
    }

    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* ── MENSAJE DE ERROR ───────────────────────────────── */
    .error-msg {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.875rem;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .error-msg.visible {
      display: flex;
    }

    /* ── FOOTER ─────────────────────────────────────────── */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      color: #9ca3af;
      font-size: 0.8rem;
    }

    /* ── SPINNER ────────────────────────────────────────── */
    .spinner-btn {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="login-card">

    <!-- Header -->
    <div class="login-header">
      <img src="img/LOGO-SENA.jpg" alt="Logo SENA" class="login-logo" />
      <h1>Biblioteca SENA</h1>
      <p>Sistema de Gestión — Inicia sesión para continuar</p>
    </div>

    <!-- Mensaje de error -->
    <div class="error-msg" id="error-msg">
      <span>⚠️</span>
      <span id="error-texto">Documento o contraseña incorrectos</span>
    </div>

    <!-- Formulario -->
    <div class="mb-4">
      <label class="form-label">Documento de identidad</label>
      <input
        type="text"
        class="form-control"
        id="documento"
        placeholder="Ingresa tu número de documento"
        onkeydown="teclaEnter(event)"
      />
    </div>

    <div class="mb-4">
      <label class="form-label">Contraseña</label>
      <input
        type="password"
        class="form-control"
        id="contrasena"
        placeholder="Ingresa tu contraseña"
        onkeydown="teclaEnter(event)"
      />
    </div>

    <button class="btn-login" id="btn-login" onclick="iniciarSesion()">
      Iniciar Sesión
    </button>

    <div class="login-footer">
      <p>¿No tienes cuenta? Contacta al administrador de la biblioteca</p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>

    const API_URL = 'http://localhost:3000/api';

    // ── PERMITIR LOGIN CON TECLA ENTER ───────────────────────
    const teclaEnter = (event) => {
      if (event.key === 'Enter') iniciarSesion();
    };

    // ── MOSTRAR ERROR ────────────────────────────────────────
    const mostrarError = (mensaje) => {
      const div = document.getElementById('error-msg');
      document.getElementById('error-texto').textContent = mensaje;
      div.classList.add('visible');
    };

    const ocultarError = () => {
      document.getElementById('error-msg').classList.remove('visible');
    };

    // ── FUNCIÓN PRINCIPAL DE LOGIN ───────────────────────────
    const iniciarSesion = async () => {
      const documento = document.getElementById('documento').value.trim();
      const contrasena = document.getElementById('contrasena').value.trim();
      const btn = document.getElementById('btn-login');

      ocultarError();

      // Validación básica en el frontend
      if (!documento || !contrasena) {
        mostrarError('Por favor ingresa tu documento y contraseña');
        return;
      }

      // Mostramos el spinner mientras carga
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-btn"></span>Iniciando sesión...';

      try {
        const respuesta = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ documento, contrasena }),
        });

        const datos = await respuesta.json();

        if (!respuesta.ok) {
          mostrarError(datos.message || 'Error al iniciar sesión');
          return;
        }

        // ── LOGIN EXITOSO ────────────────────────────────────
        // Guardamos el token y los datos del usuario en localStorage
        // Así las otras páginas saben quién está logueado
        sessionStorage.setItem('token', datos.token);
        sessionStorage.setItem('usuario', JSON.stringify(datos.data));

        // Redirigimos según el rol
        if (datos.data.rol === 'admin') {
          // El admin va al panel que ya tenías
          window.location.href = 'index.html';
        } else {
          // El usuario normal va al panel de usuario
          window.location.href = 'usuario/index.html';
        }

      } catch (error) {
        mostrarError('No se pudo conectar con el servidor. ¿Está corriendo el backend?');
      } finally {
        // Restauramos el botón siempre, haya error o no
        btn.disabled = false;
        btn.innerHTML = 'Iniciar Sesión';
      }
    };

    // ── VERIFICAR SI YA ESTÁ LOGUEADO ────────────────────────
    // Si el usuario ya tiene sesión activa, lo redirigimos directamente
    const verificarSesionActiva = () => {
      const token = sessionStorage.getItem('token');
      const usuario = sessionStorage.getItem('usuario');

      if (token && usuario) {
        const datos = JSON.parse(usuario);
        if (datos.rol === 'admin') {
          window.location.href = 'index.html';
        } else {
          window.location.href = 'usuario/index.html';
        }
      }
    };

    // Verificamos al cargar la página
    verificarSesionActiva();

  </script>

</body>
</html>
